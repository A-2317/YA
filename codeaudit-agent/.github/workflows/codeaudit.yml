name: CodeAudit Agent
on: [pull_request]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: codeaudit-agent scan . --out audit-out --fail-on high
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeaudit-report
          path: audit-out
